# The URL the site will be built for
base_url = "https://nilenso.com"

[markdown.highlighting]
# Whether to do syntax highlighting
# Theme can be customised by setting the `highlight_theme` variable to a theme supported by Zola
theme = "catppuccin-mocha"

[extra]
# Put all your custom variables here
tabs = [
    {name="work",path="/work/",nav=true},
    {name="jobs",path="/jobs/",nav=true},
    # {name="perks",path="/perks/",nav=true},
    {name="people",path="/people/",nav=true},
    {name="blog",path="http://blog.nilenso.com/",nav=true},
    {name="alumni",path="/alumni/",nav=false},
    {name="talks",path="/talks/",nav=true},
    {name="contact",path="#contact",nav=true},
]
